server:
  bind: "127.0.0.1:8787"

user:
  id: "florian"
  display_name: "Florian"

paths:
  runtime: ".local/runtime"
  archive: ".local/archive"
  inbox: ".local/inbox"

sqlite:
  path: ".local/runtime/users/florian/main.sqlite"

ingest:
  enabled: true
  scan_interval: "30s"
  settle_duration: "10s"
  workers: 2
  extract_timeout: "2m"
  max_attempts: 3

llm:
  enabled: false
  base_url: "http://127.0.0.1:11434/v1"
  model: ""
