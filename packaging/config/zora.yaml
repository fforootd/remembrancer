server:
  bind: "127.0.0.1:8787"

user:
  id: "local"
  display_name: "Local User"

paths:
  runtime: "/var/lib/zora/runtime"
  archive: "/var/lib/zora/archive"
  inbox: "/var/lib/zora/inbox"

sqlite:
  path: "/var/lib/zora/runtime/users/local/main.sqlite"

ingest:
  enabled: true
  scan_interval: "30s"
  settle_duration: "10s"
  workers: 2
  max_attempts: 3

extract:
  provider: "docling"
  timeout: "5m"
  docling:
    base_url: "http://127.0.0.1:5001"
    api_key: ""
    output_formats: ["md", "text", "json"]
    do_ocr: true
    force_ocr: false
    table_mode: "accurate"
    image_export_mode: "placeholder"

llm:
  enabled: false
  provider: "ollama"
  base_url: "http://127.0.0.1:11434"
  model: "gemma4:e2b-it-q4_K_M"
  timeout: "2m"
  context_tokens: 16384
  max_output_tokens: 2048
  temperature: 0.1
